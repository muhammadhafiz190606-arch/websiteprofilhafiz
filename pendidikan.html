<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendidikan - Muhammad Hafiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#141e30,#243b55);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Card utama */
.container{
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:20px;
  padding:40px;
  width:90%;
  max-width:600px;
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
  text-align:center;
  animation: fadeUp 1s ease;
}

h1{
  margin-bottom:20px;
  font-size:30px;
}

/* List pendidikan */
.item{
  margin:15px 0;
  padding:15px;
  border-radius:15px;
  background: rgba(255,255,255,0.07);
  transition:0.3s;
}

.item:hover{
  transform:scale(1.05);
  background: rgba(0,245,212,0.2);
}

/* Animasi */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>

<body>

<div class="container">
  <h1>🎓 Pendidikan</h1>

  <div class="item">SD - (DAYAH GUCI)</div>
  <div class="item">SMP - (1 INDRAJAYA)</div>
  <div class="item">SMA/SMK - (1 INDRJAYA)</div>
  <div class="item">Kuliah - (UNIVERSITAS JABAL GHAFUR)</div>

</div>

</body>
</html>
