<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Muhammad Hafiz</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

header{
  text-align:center;
  padding:50px 20px;
}

header img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #00f5d4;
  margin-bottom:15px;
}

header h1{font-size:38px;}
header p{opacity:0.7;}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:25px;
  backdrop-filter:blur(12px);
  transition:0.4s;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.card h2{margin-bottom:10px;}

.card::after{
  content:"Klik untuk buka";
  position:absolute;
  bottom:-40px;
  left:0;
  width:100%;
  text-align:center;
  background:#00f5d4;
  color:#000;
  padding:8px;
  transition:0.3s;
}

.card:hover::after{
  bottom:0;
}

iframe{
  width:100%;
  height:100vh;
  border:none;
  display:none;
}

.back{
  position:fixed;
  top:20px;
  left:20px;
  background:#00f5d4;
  color:#000;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  display:none;
}

</style>
</head>
<body>

<button class="back" onclick="backHome()">⬅ Kembali</button>

<header id="home">
  <img src="c:\Users\MSI\Pictures\WhatsApp Image 2026-04-27 at 00.05.26.jpeg">
  <h1>Muhammad Hafiz</h1>
  <p>Saya adalah seorang kreator digital dari Aceh yang fokus pada pembuatan konten YouTube dan pengembangan website modern.</p>
</header>

<div class="container" id="menu">
  <div class="card" onclick="openPage('pendidikan.html')">
    <h2>Pendidikan</h2>
    <p> Lihat riwayat </p>
  </div>

  <div class="card" onclick="openPage('keahlian.html')">
    <h2>Keahlian</h2>
    <p>Lihat skill yang dimiliki</p>
  </div>

  <div class="card" onclick="openPage('hobi.html')">
    <h2>Hobi</h2>
    <p>Lihat aktivitas favorit</p>
  </div>

  <div class="card" onclick="openPage('project.html')">
    <h2>Project</h2>
    <p>Lihat hasil karya</p>
  </div>

  <div class="card" onclick="openPage('kontak.html')">
    <h2>Kontak</h2>
    <p>Hubungi saya</p>
  </div>
</div>

<iframe id="frame"></iframe>

<script>
function openPage(page){
  document.getElementById('frame').style.display='block';
  document.getElementById('frame').src=page;
  document.getElementById('menu').style.display='none';
  document.getElementById('home').style.display='none';
  document.querySelector('.back').style.display='block';
}

function backHome(){
  document.getElementById('frame').style.display='none';
  document.getElementById('menu').style.display='grid';
  document.getElementById('home').style.display='block';
  document.querySelector('.back').style.display='none';
}
</script>

</body>
</html>
