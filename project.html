<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:40px 20px;
}

header h1{
  font-size:32px;
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(12px);
  transition:0.4s;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
}

/* IMAGE */
.card img{
  width:100%;
  border-radius:15px;
  margin-bottom:10px;
}

/* TITLE */
.card h3{
  margin:10px 0;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  background:#00f5d4;
  color:#000;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

</style>
</head>
